AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: AI Research Analyst - Daily digest pipeline

Parameters:
  FromEmail:
    Type: String
    Description: Email address to send digest from (will be SES-verified)
  ToEmail:
    Type: String
    Description: Email address to receive digest
  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications (pipeline failures, empty digests)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 512

Resources:

  # S3: Run manifests
  RunsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-runs-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldRuns
            Status: Enabled
            ExpirationInDays: 90

  # SES: Email identity (sender)
  SESFromIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref FromEmail
      DkimAttributes:
        SigningEnabled: true
      FeedbackAttributes:
        EmailForwardingEnabled: false

  # SES: Configuration set (reputation tracking)
  SESConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub '${AWS::StackName}-config'
      ReputationOptions:
        ReputationMetricsEnabled: true
      SendingOptions:
        SendingEnabled: true

  # Lambda
  DailyDigestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: handlers/daily_digest.handler
      Environment:
        Variables:
          ENV: lambda
          FROM_EMAIL: !Ref FromEmail
          TO_EMAIL: !Ref ToEmail
          RUNS_BUCKET: !Ref RunsBucket
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub '${RunsBucket.Arn}/runs/*'
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ai-research-analyst/*'
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 * * ? *)
            Description: Daily AI research digest at 7AM UTC
            Enabled: true

  # SNS: Alert topic for pipeline failures
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${AWS::StackName}-alerts'
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # CloudWatch Alarm: Lambda invocation errors
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-lambda-errors'
      AlarmDescription: Fires when the daily digest Lambda invocation fails
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DailyDigestFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # CloudWatch Alarm: Empty digest (pipeline succeeded but scored 0 articles)
  EmptyDigestAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-empty-digest'
      AlarmDescription: Fires when the pipeline runs successfully but produces no scored articles
      Namespace: AIResearchAnalyst
      MetricName: EmptyDigest
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  DailyDigestFunctionArn:
    Value: !GetAtt DailyDigestFunction.Arn
  RunsBucketName:
    Value: !Ref RunsBucket
  SESIdentity:
    Value: !Ref SESFromIdentity
    Description: SES email identity - check AWS Console to confirm verification status
  AlertTopicArn:
    Value: !Ref AlertTopic
    Description: SNS topic ARN for pipeline failure alerts
